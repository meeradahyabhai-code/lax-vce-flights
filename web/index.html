<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dahyabhai Cruise Flights — LAX → VCE Flights</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0f;
    --azure: #1a3a6b;
    --lagoon: #0d6e8a;
    --gold: #b8953a;
    --gold-light: #d4af6a;
    --fog: #eeeef4;
    --paper: #f8f8fc;
    --serif: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
    --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); font-weight: 400; }

  /* Hero */
  .hero {
    background:
      linear-gradient(rgba(250,248,243,0.85), rgba(250,248,243,0.85)),
      url('https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=1600') center/cover no-repeat;
    text-align: center; padding: 100px 24px;
    position: relative;
  }
  .hero-pill {
    display: inline-block;
    background: rgba(184,149,58,0.06); border: 1px solid rgba(184,149,58,0.35);
    border-radius: 9999px; padding: 5px 18px;
    font-family: var(--sans); font-size: 10px; font-weight: 500;
    color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase;
  }
  .hero-title {
    font-family: var(--serif); font-size: clamp(56px, 12vw, 96px);
    font-weight: 300; font-style: italic; color: #1a3a6b;
    letter-spacing: -0.02em; line-height: 1.1; margin-top: 24px;
  }
  .hero-subtitle {
    font-family: var(--serif); font-size: 26px; font-weight: 300;
    font-style: italic; color: #2a5298; line-height: 1.5; margin-top: 6px;
  }
  .hero-rule {
    width: 80px; height: 1px; background: var(--gold);
    margin: 32px auto 0;
  }

  /* Layout */
  .container { max-width: 680px; margin: 0 auto; padding: 0 16px 48px; }

  /* Date tabs */
  .tabs { display: flex; gap: 8px; margin: 24px 0 16px; flex-wrap: wrap; }
  .tab {
    font-family: var(--sans); font-size: 24px; font-weight: 500;
    padding: 8px 20px; border-radius: 0; border: none;
    border-bottom: 2px solid transparent;
    background: transparent; color: #94a3b8; cursor: pointer; transition: all 0.15s;
  }
  .tab:hover { color: var(--ink); border-bottom-color: var(--fog); }
  .tab.active {
    background: transparent; color: var(--ink); border-bottom-color: var(--gold);
  }

  /* Filter bar */
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .filter-btn {
    font-family: var(--sans); font-size: 12px; font-weight: 400;
    padding: 5px 14px; border-radius: 9999px; border: 1px solid var(--fog);
    background: #fff; color: var(--ink); cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--lagoon); color: var(--lagoon); }
  .filter-btn.active {
    background: var(--lagoon); color: #fff; border-color: var(--lagoon);
  }

  /* Flight card */
  .card {
    background: #fff; border: 1px solid var(--fog); border-radius: 16px;
    padding: 28px; margin-bottom: 14px;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.09); transform: translateY(-3px); }
  .card.top-pick { border: 2px solid var(--gold-light); }
  .card-inner { display: flex; justify-content: space-between; gap: 16px; }
  .card-left { flex: 1; min-width: 0; }
  .card-right { text-align: right; flex-shrink: 0; }

  .airline-name { font-size: 16px; font-weight: 500; color: var(--ink); }
  .badge {
    display: inline-block; font-size: 10px; font-weight: 500;
    padding: 2px 8px; border-radius: 9999px; letter-spacing: 0.3px;
    vertical-align: middle;
  }
  .badge-source { background: var(--azure); color: var(--fog); }
  .badge-basic { background: var(--gold); color: #fff; }
  .badge-main { background: var(--fog); color: var(--ink); }
  .badge-top {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #fff; font-weight: 500; padding: 3px 12px; margin-bottom: 8px;
  }

  .times {
    font-family: var(--serif); font-size: 26px; font-weight: 600;
    color: #0a0a0f; letter-spacing: -0.5px; line-height: 1.7;
  }
  .times .arr-time { display: inline; }
  .meta { font-size: 13px; font-weight: 300; color: var(--lagoon); }
  .layover { font-size: 12px; font-weight: 300; color: #94a3b8; }

  .price {
    font-family: var(--serif); font-size: 32px; font-weight: 600;
    color: #1a3a6b; letter-spacing: -1px; line-height: 1.1;
  }
  .est-main { font-size: 12px; font-weight: 300; color: #94a3b8; }
  .est-main-price {
    font-family: var(--serif); font-size: 18px; font-weight: 300; color: #64748b;
  }
  .basic-label { font-size: 12px; font-weight: 400; color: var(--gold); }
  .score-label { font-size: 11px; font-weight: 300; color: #94a3b8; }
  .book-btn {
    display: inline-block; margin-top: 10px;
    background: var(--ink); color: var(--paper);
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    text-decoration: none; padding: 8px 18px; border-radius: 8px;
    letter-spacing: 0.3px; transition: background 0.15s; cursor: pointer;
    border: none;
  }
  .book-btn:hover { background: var(--azure); }

  /* Show more toggle */
  .show-more-btn {
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    color: var(--azure); background: none; border: none; cursor: pointer;
    padding: 10px 0;
  }
  .show-more-btn:hover { color: var(--lagoon); }

  /* Date heading */
  .date-heading {
    font-family: var(--serif); font-size: 32px; font-weight: 400;
    color: var(--ink); letter-spacing: -0.3px; padding: 28px 0 10px;
  }
  .date-count { font-size: 12px; font-weight: 300; color: #b0b0c0; margin-left: 10px; }

  /* Footer */
  .footer {
    margin-top: 36px; border-top: 1px solid var(--fog); padding: 20px 0;
    text-align: center; font-size: 11px; font-weight: 300; color: #94a3b8;
  }

  /* Loading / error */
  .status { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 14px; }

  /* Modal overlay */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(10,10,15,0.55); backdrop-filter: blur(4px);
    z-index: 1000; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff; border-radius: 16px; padding: 32px 28px;
    max-width: 400px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
  }
  .modal-title {
    font-family: var(--serif); font-size: 24px; font-weight: 400;
    color: var(--ink); margin-bottom: 6px;
  }
  .modal-sub {
    font-size: 13px; font-weight: 300; color: #94a3b8; margin-bottom: 20px;
  }
  .modal-input {
    width: 100%; padding: 12px 16px; border: 1px solid var(--fog);
    border-radius: 10px; font-family: var(--sans); font-size: 15px;
    font-weight: 400; color: var(--ink); outline: none;
    transition: border-color 0.15s;
  }
  .modal-input:focus { border-color: var(--azure); }
  .modal-btn {
    display: inline-block; margin-top: 16px; padding: 10px 28px;
    border-radius: 9999px; font-family: var(--sans); font-size: 14px;
    font-weight: 500; cursor: pointer; border: none; transition: all 0.15s;
  }
  .modal-btn-primary {
    background: var(--azure); color: #fff;
  }
  .modal-btn-primary:hover { background: var(--lagoon); }

  /* Book modal */
  .book-modal-summary {
    background: var(--fog); border-radius: 10px; padding: 14px 18px;
    margin-bottom: 20px; text-align: left;
  }
  .book-modal-summary .bm-airline {
    font-size: 15px; font-weight: 500; color: var(--ink);
  }
  .book-modal-summary .bm-detail {
    font-size: 13px; font-weight: 300; color: #64748b; margin-top: 2px;
  }
  .book-modal-summary .bm-price {
    font-family: var(--serif); font-size: 24px; font-weight: 400;
    color: var(--ink); margin-top: 4px;
  }
  .book-modal-actions { display: flex; flex-direction: column; gap: 10px; }
  .bm-btn {
    padding: 12px 20px; border-radius: 10px; font-family: var(--sans);
    font-size: 14px; font-weight: 500; cursor: pointer; border: none;
    transition: all 0.15s;
  }
  .bm-btn-book {
    background: var(--azure); color: #fff;
  }
  .bm-btn-book:hover { background: var(--lagoon); }
  .bm-btn-explore {
    background: var(--fog); color: var(--ink);
  }
  .bm-btn-explore:hover { background: #e0e0ec; }

  /* Family Picks section */
  .family-section {
    margin-top: 36px; padding-top: 28px;
    border-top: 1px solid var(--fog);
  }
  .family-title {
    font-family: var(--serif); font-size: 24px; font-weight: 400;
    color: var(--ink); letter-spacing: -0.3px; margin-bottom: 16px;
  }
  .family-cards { display: flex; flex-direction: column; gap: 10px; }
  .family-card {
    background: #fff; border: 1px solid var(--fog); border-radius: 10px;
    padding: 14px 18px; display: flex; align-items: center; gap: 12px;
  }
  .family-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
  .fc-icon { font-size: 22px; flex-shrink: 0; }
  .fc-body { flex: 1; min-width: 0; }
  .fc-text { font-size: 14px; font-weight: 400; color: var(--ink); }
  .fc-text strong { font-weight: 500; }
  .fc-time { font-size: 11px; font-weight: 300; color: #94a3b8; margin-top: 2px; }
  .family-empty {
    font-size: 13px; font-weight: 300; color: #94a3b8; text-align: center;
    padding: 20px;
  }

  @media (max-width: 600px) {
    .card { padding: 16px; }
    .card-inner { flex-direction: row; gap: 10px; }
    .card-left { flex: 1; min-width: 0; max-width: 58%; }
    .card-right { text-align: right; min-width: 130px; flex-shrink: 0; }
    .times { font-size: 28px; }
    .times .dep-time { display: block; }
    .times .arr-time { display: block; }
    .airline-name { font-size: 16px; }
    .meta { font-size: 14px; }
    .layover { font-size: 13px; }
    .price { font-size: 32px; }
    .book-btn { display: block; width: 100%; text-align: center; margin-top: 8px; }
  }
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="hero-pill" id="countdown-pill">&#128336; <span id="countdown"></span> DAYS UNTIL JULY 3, 2026</div>
  <div class="hero-title">Cruise Bound</div>
  <div class="hero-subtitle">First stop &mdash; Venice, Italy</div>
  <div class="hero-rule"></div>
</div>

<div class="container">
  <!-- Date tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Filters -->
  <div class="filters" id="filters"></div>

  <!-- Flight list -->
  <div id="flights"></div>

  <!-- Family Picks -->
  <div class="family-section" id="family-section">
    <div class="family-title">&#128104;&#8205;&#128105;&#8205;&#128103; Family Picks</div>
    <div class="family-cards" id="family-cards">
      <div class="family-empty">Loading family picks&hellip;</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer" id="footer"></div>
</div>

<!-- Name prompt modal -->
<div class="modal-overlay" id="name-modal">
  <div class="modal">
    <div class="modal-title">Welcome to Dahyabhai Cruise Flights</div>
    <div class="modal-sub">What's your name?</div>
    <input class="modal-input" id="name-input" type="text" placeholder="e.g. Mom, Dad, Meera" maxlength="30" autocomplete="off">
    <br>
    <button class="modal-btn modal-btn-primary" id="name-submit">Let's go</button>
  </div>
</div>

<!-- Book confirmation modal -->
<div class="modal-overlay" id="book-modal">
  <div class="modal">
    <div class="modal-title">Ready to book?</div>
    <div class="book-modal-summary" id="book-modal-summary"></div>
    <div class="book-modal-actions">
      <button class="bm-btn bm-btn-book" id="bm-book">&#9992;&#65039; I'm booking this!</button>
      <button class="bm-btn bm-btn-explore" id="bm-explore">&#128064; Just exploring</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const TRIP = new Date('2026-07-03T00:00:00');
  const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwBSvTPQqbG3WZZAW3sTygBAinDOWZ4Nj-i8CHTKU_K0UfFM6LQFm8322xCNa1ufSsd/exec';

  const GOOGLE_FLIGHTS_FALLBACK = 'https://www.google.com/flights#search;f=LAX;t=VCE;d={date};tt=o;c=e;s=1';

  function daysToGo() {
    const pst = new Date(new Date().toLocaleString("en-US", {timeZone: "America/Los_Angeles"}));
    pst.setHours(0,0,0,0);
    return Math.ceil((TRIP - pst) / 86400000);
  }

  const FILTERS = [
    { id: 'all',       label: 'All' },
    { id: 'morning',   label: 'Morning' },
    { id: 'evening',   label: 'Evening' },
    { id: 'nonstop',   label: 'Nonstop' },
    { id: '1stop',     label: '1 Stop' },
    { id: 'under900',  label: 'Under $900' },
    { id: 'under1100', label: 'Under $1,100' },
    { id: 'dua',       label: 'Delta / United' },
  ];

  let data = null;
  let activeDate = null;
  let activeFilter = 'all';
  let expandedDates = new Set();
  let pendingBookFlight = null;

  // ---- User name ----
  function getUserName() {
    return localStorage.getItem('veniceair_user') || '';
  }

  function promptName() {
    if (getUserName()) return;
    const overlay = document.getElementById('name-modal');
    const input = document.getElementById('name-input');
    const btn = document.getElementById('name-submit');
    overlay.classList.add('active');
    input.focus();

    function submit() {
      const name = input.value.trim();
      if (!name) { input.focus(); return; }
      localStorage.setItem('veniceair_user', name);
      overlay.classList.remove('active');
    }
    btn.addEventListener('click', submit);
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') submit();
    });
  }

  // ---- Helpers ----
  function fmtTime(raw) {
    const clean = raw.replace('T', ' ').slice(0, 16);
    const d = new Date(clean.replace(' ', 'T'));
    if (isNaN(d)) return raw.slice(0, 16);
    let h = d.getHours(), m = d.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return h + ':' + String(m).padStart(2, '0') + ' ' + ampm;
  }

  function fmtDuration(min) {
    const h = Math.floor(min / 60), m = min % 60;
    return h ? h + 'h ' + m + 'm' : m + 'm';
  }

  function depHour(f) {
    const clean = f.departure_time.replace('T', ' ').slice(0, 16);
    const d = new Date(clean.replace(' ', 'T'));
    return isNaN(d) ? -1 : d.getHours();
  }

  function bookUrl(f) {
    if (f.google_flights_url) return f.google_flights_url;
    return GOOGLE_FLIGHTS_FALLBACK.replace('{date}', f.search_date);
  }

  function flightId(f) {
    return f.primary_airline + '|' + f.search_date + '|' + f.price;
  }

  function timeAgo(ts) {
    const now = Date.now();
    const diff = now - new Date(ts).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    const days = Math.floor(hrs / 24);
    return days + 'd ago';
  }

  // ---- Google Sheets ----
  function fmtSheetDate(dateStr) {
    try {
      return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US',
        { month: 'long', day: 'numeric', year: 'numeric' });
    } catch (e) { return dateStr; }
  }

  function fmtSheetTime(raw) {
    if (!raw) return '';
    return raw.replace('T', ' ').slice(11, 16);
  }

  function airlineLabel(flight) {
    var a = flight.airlines || [];
    if (a.length === 0) return flight.primary_airline || '';
    var unique = a.filter(function (v, i, arr) { return arr.indexOf(v) === i; });
    return unique.join(' + ');
  }

  function logToSheets(action, flight) {
    const name = getUserName() || 'Anonymous';
    const params = new URLSearchParams({
      name: name,
      action: action,
      airline: airlineLabel(flight),
      flight_date: fmtSheetDate(flight.search_date),
      departure_time: fmtSheetTime(flight.departure_time),
      arrival_time: fmtSheetTime(flight.arrival_time),
      layover: flight.layover_info || 'Nonstop',
      price: String(flight.price),
      fare_type: flight.fare_type || 'Economy Main',
      flight_id: flightId(flight),
    });
    fetch(SHEETS_URL + '?' + params.toString(), { mode: 'no-cors' })
      .catch(function () { /* silent */ });
  }

  function fetchFamilyPicks() {
    fetch(SHEETS_URL + '?action=read')
      .then(function (r) { return r.json(); })
      .then(function (rows) { renderFamilyPicks(rows); })
      .catch(function () {
        document.getElementById('family-cards').innerHTML =
          '<div class="family-empty">Could not load family picks.</div>';
      });
  }

  // ---- Book modal ----
  function showBookModal(f) {
    pendingBookFlight = f;
    const summary = document.getElementById('book-modal-summary');
    const niceDate = new Date(f.search_date + 'T12:00:00').toLocaleDateString('en-US',
      { month: 'short', day: 'numeric', weekday: 'short' });
    summary.innerHTML =
      '<div class="bm-airline">' + f.primary_airline + '</div>' +
      '<div class="bm-detail">' + niceDate + ' &middot; ' +
        fmtTime(f.departure_time) + ' &rarr; ' + fmtTime(f.arrival_time) + '</div>' +
      '<div class="bm-price">$' + f.price.toLocaleString() + '</div>';
    document.getElementById('book-modal').classList.add('active');
  }

  function setupBookModal() {
    var overlay = document.getElementById('book-modal');
    document.getElementById('bm-book').addEventListener('click', function () {
      if (!pendingBookFlight) return;
      logToSheets('booked', pendingBookFlight);
      window.open(bookUrl(pendingBookFlight), '_blank');
      overlay.classList.remove('active');
      pendingBookFlight = null;
      setTimeout(fetchFamilyPicks, 2000);
    });
    document.getElementById('bm-explore').addEventListener('click', function () {
      if (!pendingBookFlight) return;
      logToSheets('interested', pendingBookFlight);
      window.open(bookUrl(pendingBookFlight), '_blank');
      overlay.classList.remove('active');
      pendingBookFlight = null;
      setTimeout(fetchFamilyPicks, 2000);
    });
    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) {
        overlay.classList.remove('active');
        pendingBookFlight = null;
      }
    });
  }

  // ---- Filter logic ----
  function passesFilter(f) {
    const h = depHour(f);
    switch (activeFilter) {
      case 'morning':   return h >= 6 && h <= 10;
      case 'evening':   return h >= 18 && h <= 21;
      case 'nonstop':   return f.stops === 0;
      case '1stop':     return f.stops === 1;
      case 'under900':  return f.price < 900;
      case 'under1100': return f.price < 1100;
      case 'dua':       return /^(delta|united)$/i.test(f.primary_airline);
      default:          return true;
    }
  }

  // ---- Render ----
  function renderCountdown() {
    document.getElementById('countdown').textContent = daysToGo();
  }

  function renderTabs() {
    const el = document.getElementById('tabs');
    if (!data) return;
    const dates = [...new Set(data.flights.map(f => f.search_date))].sort();
    if (!activeDate) {
      const urlDate = new URLSearchParams(window.location.search).get('date');
      activeDate = (urlDate && dates.includes(urlDate)) ? urlDate : dates[0];
    }
    el.innerHTML = dates.map(d => {
      const label = new Date(d + 'T12:00:00').toLocaleDateString('en-US',
        { month: 'short', day: 'numeric' });
      const cls = d === activeDate ? 'tab active' : 'tab';
      return '<button class="' + cls + '" data-date="' + d + '">' + label + '</button>';
    }).join('');
    el.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeDate = btn.dataset.date;
        expandedDates.clear();
        renderTabs(); renderFlights();
      });
    });
  }

  function renderFilters() {
    const el = document.getElementById('filters');
    el.innerHTML = FILTERS.map(f => {
      const cls = f.id === activeFilter ? 'filter-btn active' : 'filter-btn';
      return '<button class="' + cls + '" data-fid="' + f.id + '">' + f.label + '</button>';
    }).join('');
    el.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeFilter = btn.dataset.fid;
        expandedDates.clear();
        renderFilters(); renderFlights();
      });
    });
  }

  function cardHTML(f, rank, isTopPick) {
    const topBadge = isTopPick
      ? '<div><span class="badge badge-top">&#11088; TOP PICK</span></div>' : '';

    const fareBadge = '<span class="badge badge-main">Economy Main</span>';

    let priceBlock;
    if (f.basic_economy_price && f.economy_main_price) {
      priceBlock = '<div class="price">~$' + f.economy_main_price.toLocaleString() + '</div>' +
        '<div class="est-main">Est. Main Cabin</div>' +
        '<div><span class="est-main-price">$' + f.basic_economy_price.toLocaleString() +
        '</span> <span class="basic-label">Basic Economy</span></div>';
    } else {
      priceBlock = '<div class="price">$' + f.price.toLocaleString() + '</div>';
    }

    const stopsLabel = f.stops === 0 ? 'Nonstop' : f.stops + ' stop';

    const fData = encodeURIComponent(JSON.stringify({
      primary_airline: f.primary_airline,
      airlines: f.airlines,
      search_date: f.search_date,
      price: f.price,
      departure_time: f.departure_time,
      arrival_time: f.arrival_time,
      stops: f.stops,
      layover_info: f.layover_info,
      fare_type: f.fare_type,
      google_flights_url: f.google_flights_url || '',
    }));

    return '<div class="card' + (isTopPick ? ' top-pick' : '') + '">' +
      topBadge +
      '<div class="card-inner">' +
        '<div class="card-left">' +
          '<span class="airline-name">' + f.primary_airline + '</span> ' +
          '<span class="badge badge-source">Google Flights</span> ' +
          fareBadge +
          '<div class="times"><span class="dep-time">' + fmtTime(f.departure_time) +
            ' &rarr;</span> <span class="arr-time">' + fmtTime(f.arrival_time) + '</span></div>' +
          '<div class="meta">' + fmtDuration(f.total_duration_min) +
            ' &middot; ' + stopsLabel + '</div>' +
          '<div class="layover">' + f.layover_info + '</div>' +
        '</div>' +
        '<div class="card-right">' +
          priceBlock +
          '<div class="score-label">score ' + f.score + '</div>' +
          '<button class="book-btn" data-flight="' + fData +
            '">Book &rarr;</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  function attachBookHandlers() {
    document.querySelectorAll('.book-btn[data-flight]').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.preventDefault();
        var fd = JSON.parse(decodeURIComponent(btn.getAttribute('data-flight')));
        showBookModal(fd);
      });
    });
  }

  function renderFlights() {
    const el = document.getElementById('flights');
    if (!data) { el.innerHTML = '<div class="status">Loading flights&hellip;</div>'; return; }

    const allForDate = data.flights
      .filter(f => f.search_date === activeDate && passesFilter(f));

    if (allForDate.length === 0) {
      el.innerHTML = '<div class="status">No flights match these filters.</div>';
      renderFooter(0);
      return;
    }

    const niceDate = new Date(activeDate + 'T12:00:00').toLocaleDateString('en-US',
      { weekday: 'long', month: 'long', day: 'numeric' });

    const isExpanded = expandedDates.has(activeDate);
    const visible = isExpanded ? allForDate : allForDate.slice(0, 3);
    const remaining = allForDate.length - 3;

    let html = '<div class="date-heading">' + niceDate +
               '<span class="date-count">' + allForDate.length +
               ' flight' + (allForDate.length !== 1 ? 's' : '') + '</span></div>';

    visible.forEach((f, i) => {
      html += cardHTML(f, i + 1, i === 0);
    });

    if (remaining > 0 && !isExpanded) {
      html += '<button class="show-more-btn" id="show-more">Show ' +
              remaining + ' more flight' + (remaining !== 1 ? 's' : '') +
              ' &#9660;</button>';
    } else if (isExpanded && remaining > 0) {
      html += '<button class="show-more-btn" id="show-less">Hide extra flights &#9650;</button>';
    }

    el.innerHTML = html;
    attachBookHandlers();

    const moreBtn = document.getElementById('show-more');
    if (moreBtn) moreBtn.addEventListener('click', () => {
      expandedDates.add(activeDate); renderFlights();
    });
    const lessBtn = document.getElementById('show-less');
    if (lessBtn) lessBtn.addEventListener('click', () => {
      expandedDates.delete(activeDate); renderFlights();
    });

    renderFooter(allForDate.length);
  }

  function renderFamilyPicks(rows) {
    const el = document.getElementById('family-cards');
    if (!rows || rows.length === 0) {
      el.innerHTML = '<div class="family-empty">No picks yet. Be the first to book!</div>';
      return;
    }
    var sorted = rows.slice().reverse();
    el.innerHTML = sorted.map(function (r) {
      if (!r.name && !r.airline) return '';  // skip empty rows
      var icon = r.action === 'booked' ? '&#9992;&#65039;' : '&#128064;';
      var verb = r.action === 'booked' ? 'booked' : 'is interested in';
      var dateLabel = r.flight_date || r.date || '';
      var priceNum = Number(r.price);
      var priceStr = isNaN(priceNum) ? '' : ' for <strong>$' + priceNum.toLocaleString() + '</strong>';
      var ago = r.timestamp ? timeAgo(r.timestamp) : '';
      return '<div class="family-card">' +
        '<div class="fc-icon">' + icon + '</div>' +
        '<div class="fc-body">' +
          '<div class="fc-text"><strong>' + escHtml(r.name || 'Someone') + '</strong> ' +
            verb + ' <strong>' + escHtml(r.airline || 'a flight') + '</strong>' +
            (dateLabel ? ' on ' + escHtml(dateLabel) : '') +
            priceStr + '</div>' +
          (ago ? '<div class="fc-time">' + ago + '</div>' : '') +
        '</div>' +
      '</div>';
    }).join('');
  }

  function escHtml(s) {
    var div = document.createElement('div');
    div.textContent = s || '';
    return div.innerHTML;
  }

  function renderFooter(count) {
    document.getElementById('footer').textContent =
      'Generated ' + (data ? data.generated : '') + ' \u00b7 ' +
      count + ' flights shown \u00b7 Prices in USD';
  }

  // ---- Init ----
  async function init() {
    promptName();
    setupBookModal();
    renderCountdown();
    renderFilters();
    fetchFamilyPicks();

    // Auto-refresh family picks every 60s
    setInterval(fetchFamilyPicks, 60000);

    document.getElementById('flights').innerHTML =
      '<div class="status">Loading flights&hellip;</div>';

    try {
      const resp = await fetch('flights.json');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      data = await resp.json();
    } catch (e) {
      document.getElementById('flights').innerHTML =
        '<div class="status">Could not load flights.json &mdash; run flight_agent.py first.</div>';
      return;
    }

    renderCountdown();
    renderTabs();
    renderFlights();
  }

  init();
})();
</script>
</body>
</html>
