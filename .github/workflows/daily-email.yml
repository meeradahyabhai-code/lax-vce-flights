name: Daily Flight Email

# DISABLED — burns ~42-138 SerpAPI credits per run.
# Dashboard at lax-vce-flights.vercel.app replaces this.
# Re-enable when SerpAPI credits are available.
on:
  workflow_dispatch: # Manual trigger only

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run flight agent
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python flight_agent.py
