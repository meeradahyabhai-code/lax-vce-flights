<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dahyabhai Vacation · Itinerary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#faf8f3;            /* warm cream canvas, single continuous tone */
    --surface:#ffffff;         /* cards lift off the cream */
    --ink:17,24,33;            /* near-black, used as rgb for opacity greys */
    --azure:#1a3a6b;
    --azure-soft:#eef2f8;
    --gold:#b8953a;
    --gold-soft:#f6efda;
    --lagoon:#2a7f8f;
    --lagoon-soft:#e6f1f3;
    --line:rgba(17,24,33,.12);
    --line-soft:rgba(17,24,33,.07);
    --t1:rgba(17,24,33,.96);   /* primary text */
    --t2:rgba(17,24,33,.80);   /* secondary, body */
    --t3:rgba(17,24,33,.62);   /* tertiary, decorative micro-text only */
    --shadow:0 1px 2px rgba(17,24,33,.04), 0 8px 24px rgba(17,24,33,.06);
    --shadow-lift:0 14px 40px rgba(17,24,33,.14);
    --green:#1c7a42;
    --green-soft:#e6f2ea;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:'DM Sans',system-ui,sans-serif;
    background:var(--paper);
    color:var(--t1);
    font-size:16px; line-height:1.55;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .serif{font-family:'Cormorant Garamond',Georgia,serif;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  .tnum{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}
  a{color:inherit; text-decoration:none;}

  /* ============ STICKY HEADER : brand + whole-trip day rail ============ */
  .top{position:sticky; top:0; z-index:30; background:rgba(250,248,243,.92); backdrop-filter:saturate(170%) blur(14px); border-bottom:1px solid var(--line-soft);}
  .top-row{display:flex; align-items:center; justify-content:space-between; gap:14px; padding:13px 20px 9px; max-width:1120px; margin:0 auto;}
  .brand{line-height:1.05;}
  .brand-name{font-family:'Cormorant Garamond',serif; font-weight:700; font-size:23px; color:var(--azure); letter-spacing:.2px;}
  .brand-sub{font-size:11px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--t3); margin-top:2px;}
  .countdown{display:flex; align-items:baseline; gap:6px; font-size:13px; color:var(--t2); background:var(--surface); border:1px solid var(--line); padding:7px 13px; border-radius:999px; box-shadow:var(--shadow); white-space:nowrap;}
  .countdown b{font-family:'Cormorant Garamond',serif; font-weight:700; font-size:18px; color:var(--gold); line-height:1;}

  /* the at-a-glance rail */
  .rail-wrap{overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch;}
  .rail-wrap::-webkit-scrollbar{display:none;}
  .rail{display:flex; gap:5px; padding:3px 16px 11px; max-width:1120px; margin:0 auto; width:max-content;}
  .rstop{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; min-width:62px; padding:7px 8px 8px; border-radius:12px; background:transparent; border:1px solid transparent; transition:background .18s, border-color .18s; position:relative;}
  .rstop:active{transform:scale(.96);}
  .rstop .rd{font-size:10.5px; font-weight:700; letter-spacing:.07em; color:var(--t3); text-transform:uppercase;}
  .rstop .rc{font-size:13px; font-weight:600; color:var(--t1); margin-top:3px; white-space:nowrap;}
  .rstop .rw{font-size:11px; font-weight:500; color:var(--t3); margin-top:2px; display:flex; align-items:center; gap:3px;}
  .rstop.active{background:var(--surface); border-color:var(--line); box-shadow:var(--shadow);}
  .rstop.today{background:var(--azure);}
  .rstop.today .rd{color:rgba(255,255,255,.66);} .rstop.today .rc{color:#fff;} .rstop.today .rw{color:rgba(255,255,255,.85);}
  .rstop.today .rw svg{stroke:rgba(255,255,255,.9);}
  .rdot{position:absolute; top:5px; right:8px; width:6px; height:6px; border-radius:50%; background:var(--gold); box-shadow:0 0 0 2px var(--paper);}
  .rstop.today .rdot{box-shadow:0 0 0 2px var(--azure);}

  main{max-width:1120px; margin:0 auto; padding:18px 16px 72px;}

  /* ============ ONE BLOCK PER DAY — everything baked in, visible ============ */
  .day{background:var(--surface); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); margin-bottom:18px; overflow:hidden; scroll-margin-top:128px;}
  .day.is-today{border-color:rgba(26,58,107,.42); box-shadow:0 0 0 1px rgba(26,58,107,.32), var(--shadow-lift);}

  /* header band */
  .day-hd{display:flex; align-items:flex-start; gap:14px; padding:18px 22px 14px;}
  .hd-date{flex:0 0 auto; width:60px; text-align:left; padding-top:5px;}
  .hd-date .dow{font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--gold);}
  .hd-date .dnum{font-family:'Cormorant Garamond',serif; font-weight:700; font-size:38px; line-height:.9; color:var(--azure); margin-top:1px;}
  .hd-date .mon{font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--t3); margin-top:2px;}
  .hd-main{flex:1; min-width:0;}
  .hd-city{font-family:'Cormorant Garamond',serif; font-weight:700; font-size:30px; line-height:1.02; color:var(--azure); display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;}
  .hd-country{font-family:'DM Sans',sans-serif; font-weight:500; font-size:14px; color:var(--t3); letter-spacing:.02em;}
  .hd-meta{display:flex; align-items:center; gap:8px 14px; flex-wrap:wrap; margin-top:8px; font-size:14px; color:var(--t2);}
  .hd-meta .wx{display:inline-flex; align-items:center; gap:6px; font-weight:600; color:var(--t1);}
  .hd-meta .wx svg{flex:0 0 auto;}
  .hd-meta .sep{width:3px; height:3px; border-radius:50%; background:var(--line); display:inline-block;}
  .hd-meta .tt{display:inline-flex; align-items:center; gap:5px;}
  .hd-meta .tt b{font-weight:600; color:var(--t1);}
  .chip{display:inline-flex; align-items:center; font-size:11.5px; font-weight:700; letter-spacing:.04em; padding:3px 10px; border-radius:999px; white-space:nowrap;}
  .chip.lang{color:var(--lagoon); background:var(--lagoon-soft);}
  .chip.tag{color:var(--gold); background:var(--gold-soft);}
  .chip.today{color:#fff; background:var(--azure); letter-spacing:.1em;}

  /* event strip — ALWAYS visible, the family anchor */
  .event{display:flex; align-items:center; gap:13px; margin:0 22px 4px; padding:13px 16px; border-radius:13px; background:var(--gold-soft); border:1px solid rgba(184,149,58,.32);}
  .event.party{background:linear-gradient(108deg,#efeaf7 0%, #f7efdc 100%); border-color:rgba(120,90,160,.26);}
  .event .star{flex:0 0 auto; color:var(--gold);}
  .event.party .star{color:#7a5aa0;}
  .event .etext{flex:1; min-width:0;}
  .event .etitle{font-weight:600; font-size:15.5px; color:var(--t1);}
  .event .esub{font-size:13.5px; color:var(--t2); margin-top:1px;}
  .event .etime{flex:0 0 auto; font-weight:700; font-size:14px; color:var(--gold); text-align:right; white-space:nowrap;}
  .event.party .etime{color:#7a5aa0;}

  /* body: a clean editorial sectioned layout */
  .body{padding:8px 22px 20px;}
  .sec{padding:15px 0; border-top:1px solid var(--line-soft);}
  .sec:first-child{border-top:none;}
  .sec-hd{font-size:11px; font-weight:700; letter-spacing:.13em; text-transform:uppercase; color:var(--t3); margin-bottom:10px;}

  /* phrases — all six visible, tap to hear */
  .phrases{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px 14px;}
  @media(max-width:520px){.phrases{grid-template-columns:1fr;}}
  .phr{display:flex; align-items:center; gap:11px; padding:8px 10px; border-radius:11px; background:var(--paper); border:1px solid var(--line-soft);}
  .phr .say{flex:0 0 auto; width:38px; height:38px; border-radius:50%; background:var(--surface); border:1px solid var(--line); color:var(--azure); display:grid; place-items:center; transition:transform .12s, background .15s;}
  .phr .say:hover{background:var(--azure-soft);}
  .phr .say:active{transform:scale(.9);}
  .phr .say.pulse{animation:pulse .65s ease-out;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(26,58,107,.38);}100%{box-shadow:0 0 0 14px rgba(26,58,107,0);}}
  .phr .ptext{min-width:0;}
  .phr .native{font-weight:600; font-size:16px; color:var(--t1); line-height:1.2;}
  .phr .pho{font-size:13px; color:var(--lagoon); font-weight:500;}
  .phr .mean{font-size:13px; color:var(--t3);}

  /* good to know */
  .know{font-size:15.5px; line-height:1.6; color:var(--t2);}

  /* food */
  .food{display:flex; flex-wrap:wrap; gap:8px;}
  .dish{display:inline-flex; align-items:center; gap:5px; font-size:14.5px; font-weight:500; color:var(--t1); padding:6px 12px; border-radius:999px; background:var(--paper); border:1px solid var(--line-soft);}
  .dish .veg{color:var(--lagoon); font-weight:700; font-size:13px;}
  .veg-key{font-size:12.5px; color:var(--lagoon); font-weight:600; margin-left:2px; align-self:center;}

  /* sea-day onboard */
  .aboard{font-size:15.5px; line-height:1.6; color:var(--t2);}

  /* ============ EXCURSION BOARD ============ */
  .exc{padding:14px 16px; border-radius:14px; background:var(--paper); border:1px solid var(--line-soft); margin-bottom:11px;}
  .exc:last-of-type{margin-bottom:11px;}
  .exc-top{display:flex; align-items:flex-start; gap:10px;}
  .exc-name{flex:1; font-weight:600; font-size:16px; color:var(--t1); line-height:1.3;}
  .exc-dur{flex:0 0 auto; font-size:13px; font-weight:500; color:var(--t3); white-space:nowrap; padding-top:2px;}
  /* booked vs interested are visually DISTINCT */
  .roster{display:flex; flex-wrap:wrap; gap:6px 7px; margin-top:10px;}
  .pp{display:inline-flex; align-items:center; gap:5px; font-size:13px; font-weight:600; padding:4px 11px 4px 9px; border-radius:999px;}
  .pp.bk{color:var(--green); background:var(--green-soft);}
  .pp.bk::before{content:""; width:7px; height:7px; border-radius:50%; background:var(--green);}
  .pp.in{color:var(--azure); background:var(--azure-soft);}
  .pp.in::before{content:""; width:7px; height:7px; border-radius:50%; border:2px solid var(--azure); box-sizing:border-box;}
  .pp.you{outline:2px solid rgba(184,149,58,.55); outline-offset:1px;}
  .exc-empty{font-size:13.5px; color:var(--t3); margin-top:9px;}
  .exc-actions{display:flex; gap:9px; flex-wrap:wrap; margin-top:13px;}
  .btn{font-size:14.5px; font-weight:600; padding:10px 18px; border-radius:11px; transition:transform .1s, background .15s; white-space:nowrap;}
  .btn:active{transform:scale(.96);}
  .btn.join{background:var(--azure); color:#fff;}
  .btn.join:hover{background:#16315c;}
  .btn.ghost{background:var(--surface); color:var(--azure); border:1px solid var(--line);}
  .btn.leave{background:var(--surface); color:var(--green); border:1px solid var(--green-soft);}
  .btn.leave::before{content:"✓ "; }
  .btn.bookmark{background:var(--green-soft); color:var(--green); border:1px solid rgba(28,122,66,.2);}
  .exc-add{display:inline-flex; align-items:center; gap:8px; font-size:15px; font-weight:600; color:var(--azure); padding:12px 18px; border-radius:12px; border:1.5px dashed rgba(26,58,107,.32); background:var(--azure-soft); width:100%; justify-content:center; margin-top:2px;}
  .exc-add:hover{background:#e4ebf6;}
  .exc-note{display:flex; gap:8px; font-size:13px; line-height:1.45; color:var(--t3); margin-top:12px; padding:10px 12px; border-radius:10px; background:rgba(184,149,58,.08);}
  .exc-note svg{flex:0 0 auto; margin-top:1px; stroke:var(--gold);}

  /* ============ ADD EXCURSION MODAL (the only modal) ============ */
  .scrim{position:fixed; inset:0; background:rgba(17,24,33,.45); z-index:50; opacity:0; pointer-events:none; transition:opacity .22s;}
  .scrim.open{opacity:1; pointer-events:auto;}
  .modal{position:fixed; z-index:51; left:50%; bottom:0; width:100%; max-width:460px; background:var(--surface); border-radius:22px 22px 0 0; padding:24px 22px calc(28px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(102%); transition:transform .32s cubic-bezier(.32,.72,0,1); box-shadow:0 -10px 50px rgba(17,24,33,.22);}
  .modal.open{transform:translateX(-50%) translateY(0);}
  @media(min-width:560px){
    .modal{bottom:auto; top:50%; border-radius:22px; transform:translate(-50%,-46%); opacity:0; transition:transform .26s cubic-bezier(.32,.72,0,1), opacity .2s;}
    .modal.open{transform:translate(-50%,-50%); opacity:1;}
  }
  .modal h3{margin:0; font-family:'Cormorant Garamond',serif; font-weight:700; font-size:26px; color:var(--azure);}
  .modal .msub{font-size:14px; color:var(--t3); margin:2px 0 16px;}
  .modal label{display:block; font-size:11.5px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--t3); margin:15px 0 6px;}
  .modal input{width:100%; padding:13px 14px; border:1px solid var(--line); border-radius:12px; font-size:16px; font-family:inherit; color:var(--t1); background:var(--paper);}
  .modal input:focus{outline:none; border-color:var(--azure); background:#fff;}
  .seg{display:flex; gap:9px;}
  .seg button{flex:1; padding:12px; border:1px solid var(--line); border-radius:12px; font-size:14.5px; font-weight:600; color:var(--t2); background:var(--paper); transition:.15s;}
  .seg button .dotmark{display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:7px; vertical-align:-1px;}
  .seg button[data-s="interested"] .dotmark{border:2px solid var(--azure); box-sizing:border-box;}
  .seg button[data-s="booked"] .dotmark{background:var(--green);}
  .seg button.on[data-s="interested"]{background:var(--azure); color:#fff; border-color:var(--azure);}
  .seg button.on[data-s="interested"] .dotmark{border-color:#fff;}
  .seg button.on[data-s="booked"]{background:var(--green); color:#fff; border-color:var(--green);}
  .seg button.on[data-s="booked"] .dotmark{background:#fff;}
  .shot{display:flex; align-items:center; gap:11px; margin-top:2px; padding:14px; border:1.5px dashed var(--line); border-radius:12px; font-size:14px; color:var(--t3); background:var(--paper);}
  .shot svg{flex:0 0 auto; stroke:var(--t3);}
  .shot small{display:block; font-size:12.5px; color:var(--t3);}
  .m-actions{display:flex; gap:11px; margin-top:22px;}
  .m-actions button{flex:1; padding:14px; border-radius:13px; font-weight:600; font-size:15.5px;}
  .m-save{background:var(--azure); color:#fff;}
  .m-cancel{background:rgba(17,24,33,.06); color:var(--t2);}

  /* footer */
  .foot{text-align:center; font-size:12.5px; color:var(--t3); padding:6px 16px 0; max-width:1120px; margin:0 auto;}

  @media(min-width:780px){
    main{padding:24px 24px 88px;}
    .hd-city{font-size:34px;}
    .hd-date .dnum{font-size:42px;}
    .phrases{grid-template-columns:repeat(3,minmax(0,1fr));}
  }
</style>
</head>

    <div class="brand">
      <div class="brand-name">Dahyabhai Vacation</div>
      <div class="brand-sub">Venice · Mediterranean · Istanbul</div>

    <div class="countdown tnum"><b id="cd">21</b> days to go</div>

var exStore=loadExc();
function loadExc(){try{var s=JSON.parse(localStorage.getItem('dahya_v3_exc'));if(s)return s;}catch(e){}return JSON.parse(JSON.stringify(SEED));}

/* ---- tiny inline weather glyphs (no emoji chrome) ---- */
function wxSvg(kind){
 if(kind==='sun') return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#b8953a" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2M12 19.5v2M2.5 12h2M19.5 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg>';
 return '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#7c8794" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18a4 4 0 0 1 .6-7.96A5.5 5.5 0 0 1 18 11.2 3.5 3.5 0 0 1 17.5 18Z"/></svg>';
}
function railWx(kind){
 if(kind==='sun') return '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#b8953a" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 3v1.5M12 19.5V21M3 12h1.5M19.5 12H21M5.6 5.6l1 1M17.4 17.4l1 1M18.4 5.6l-1 1M6.6 17.4l-1 1"/></svg>';
 return '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#9aa3ad" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18a4 4 0 0 1 .6-7.96A5.5 5.5 0 0 1 18 11.2 3.5 3.5 0 0 1 17.5 18Z"/></svg>';
}
var anchorSvg='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2"/><path d="M12 7v13M5 12a7 7 0 0 0 14 0M4 12h2M18 12h2"/></svg>';
var speakerSvg='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M18 6a8 8 0 0 1 0 12"/></svg>';
var starSvg='<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.5l2.6 6.3 6.8.5-5.2 4.4 1.7 6.6L12 17.3 6.3 20.8 8 14.2 2.8 9.8l6.8-.5z"/></svg>';

var camSvg='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h3l1.4-2h7.2L18 8h2a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z"/><circle cx="12" cy="13" r="3.3"/></svg>';

/* ---- countdown ---- */
(function(){
 var diff=Math.round((new Date('2026-07-03')-new Date('2026-06-12'))/864e5);
 document.getElementById('cd').textContent=diff>0?diff:0;
})();

/* ============ RAIL — whole trip at a glance ============ */
function renderRail(){
 var h='';
 DAYS.forEach(function(p){
   var w=WX[p.date];
   var cls='rstop'+(p.date===TODAY?' today':'');
   h+='<a class="'+cls+'" href="#d'+p.d+'" data-day="'+p.d+'">'
     +(p.event?'<span class="rdot"></span>':'')
     +'<span class="rd">'+p.dow+' '+p.d+'</span>'
     +'<span class="rc">'+p.city+'</span>'
     +'<span class="rw">'+(w?railWx(w.i)+' '+w.h+'°':anchorSvg+' Sea')+'</span>'
     +'</a>';
 });
 document.getElementById('rail').innerHTML=h;
}

/* ============ DAY BLOCKS — everything baked in ============ */
function renderDays(){
 document.getElementById('main').innerHTML=DAYS.map(dayHtml).join('');
 wire();
}

function dayHtml(p){
 var w=WX[p.date];
 var isToday=p.date===TODAY;
 var mon='Jul';

 /* header meta line */
 var meta='';
 if(w) meta+='<span class="wx">'+wxSvg(w.i)+' '+w.h+'° / '+w.l+'°</span>'+(w.r>5?'<span class="sep"></span><span>'+w.r+'% rain</span>':'');
 if(p.arrive){ if(meta)meta+='<span class="sep"></span>'; meta+='<span class="tt">Arrive <b>'+p.arrive+'</b></span>'; }
 if(p.depart){ if(meta)meta+='<span class="sep"></span>'; meta+='<span class="tt">Depart <b>'+p.depart+'</b></span>'; }

 var chips='';
 if(p.lang) chips+='<span class="chip lang">'+p.lang+'</span>';
 if(p.tag) chips+='<span class="chip tag">'+p.tag+'</span>';
 if(isToday) chips='<span class="chip today">TODAY</span>'+chips;

 var h='<section class="day'+(isToday?' is-today':'')+'" id="d'+p.d+'">';

 /* header */
 h+='<div class="day-hd">'
   +'<div class="hd-date"><div class="dow">'+p.dow+'</div><div class="dnum tnum">'+p.d+'</div><div class="mon">'+mon+'</div></div>'
   +'<div class="hd-main">'
     +'<div class="hd-city">'+p.city+(p.country?' <span class="hd-country">'+p.country+'</span>':'')+'</div>'
     +'<div class="hd-meta tnum">'+meta+'</div>'
     +(chips?'<div class="hd-meta" style="margin-top:9px">'+chips+'</div>':'')
   +'</div>'
 +'</div>';

 /* event — always visible */
 if(p.event){
   h+='<div class="event'+(p.event.party?' party':'')+'">'
     +'<span class="star">'+starSvg+'</span>'
     +'<span class="etext"><span class="etitle">'+p.event.title+'</span>'+(p.event.sub?'<span class="esub">'+p.event.sub+'</span>':'')+'</span>'
     +'<span class="etime tnum">'+p.event.time+'</span>'
   +'</div>';
 }

 /* body */
 h+='<div class="body">';

 if(p.sea){
   h+='<div class="sec"><div class="sec-hd">On board today</div><div class="aboard">'+(SEA_DO[p.date]||'')+'</div></div>';
   h+=excSection(p);
 } else {
   /* phrases */
   var ph=PHRASES[p.content].map(function(x){
     return '<div class="phr">'
       +'<button class="say" data-t="'+encodeURIComponent(x[0])+'" data-c="'+p.code+'" aria-label="Hear '+x[0]+'">'+speakerSvg+'</button>'
       +'<span class="ptext"><span class="native">'+x[0]+'</span><span class="pho">'+x[1]+'</span> <span class="mean">· '+x[2]+'</span></span>'
     +'</div>';
   }).join('');
   h+='<div class="sec"><div class="sec-hd">A few words of '+p.lang+'</div><div class="phrases">'+ph+'</div></div>';

   /* know */
   h+='<div class="sec"><div class="sec-hd">Good to know</div><div class="know">'+KNOW[p.content]+'</div></div>';

   /* food */
   var fd=FOOD[p.content].map(function(f){
     return '<span class="dish">'+f[0]+(f[1]?'<span class="veg">✦</span>':'')+'</span>';
   }).join('');
   h+='<div class="sec"><div class="sec-hd">Worth tasting</div><div class="food">'+fd+'<span class="veg-key">✦ vegetarian</span></div></div>';

   h+=excSection(p);
 }

 h+='</div></section>';
 return h;
}

/* ---- excursion board section ---- */
function excSection(p){
 var list=exStore[p.date]||[];
 var h='<div class="sec"><div class="sec-hd">Excursions — shared board</div>';

 list.forEach(function(e){
   var mineB=e.booked.indexOf(ME)>=0, mineI=e.interested.indexOf(ME)>=0, joined=mineB||mineI;
   var people='';
   e.booked.forEach(function(n){ people+='<span class="pp bk'+(n===ME?' you':'')+'">'+(n===ME?'You':n)+' · booked</span>'; });
   e.interested.forEach(function(n){ people+='<span class="pp in'+(n===ME?' you':'')+'">'+(n===ME?'You':n)+' · interested</span>'; });

   var actions='';
   if(joined){
     actions+='<button class="btn leave" data-leave="'+e.id+'@'+p.date+'">You’re in — leave</button>';
     if(mineI) actions+='<button class="btn bookmark" data-book="'+e.id+'@'+p.date+'">I booked it with NCL</button>';
   } else {
     actions+='<button class="btn join" data-join="'+e.id+'@'+p.date+'">Join (interested)</button>';
   }

   h+='<div class="exc">'
     +'<div class="exc-top"><div class="exc-name">'+e.name+'</div>'+(e.meta?'<div class="exc-dur">'+e.meta+'</div>':'')+'</div>'
     +(people?'<div class="roster">'+people+'</div>':'<div class="exc-empty">No one signed up yet — be the first.</div>')
     +'<div class="exc-actions">'+actions+'</div>'
   +'</div>';
 });

 h+='<button class="exc-add" data-add="'+p.date+'">+ Add an excursion</button>';
 h+='<div class="exc-note">'+infoSvg+'<span><b>Join shows interest, it does not book you.</b> Book with NCL yourself, then tap “I booked it.” This board is shared with everyone on the trip.</span></div>';
 h+='</div>';
 return h;
}

/* ============ wiring ============ */
function wire(){
 document.querySelectorAll('.say').forEach(function(b){
   b.onclick=function(){
     b.classList.remove('pulse'); void b.offsetWidth; b.classList.add('pulse');
     if('speechSynthesis' in window){
       var u=new SpeechSynthesisUtterance(decodeURIComponent(b.dataset.t));
       u.lang=b.dataset.c; u.rate=.82;
       speechSynthesis.cancel(); speechSynthesis.speak(u);
     }
   };
 });
 bindEx('[data-join]','join'); bindEx('[data-leave]','leave'); bindEx('[data-book]','book');
 document.querySelectorAll('[data-add]').forEach(function(b){ b.onclick=function(){ openAdd(b.dataset.add); }; });
}
function bindEx(sel,kind){
 document.querySelectorAll(sel).forEach(function(b){
   b.onclick=function(){
     var key=b.dataset[kind==='book'?'book':kind];
     var parts=key.split('@'), e=getEx(parts[1],parts[0]); if(!e)return;
     if(kind==='join'){ if(e.interested.indexOf(ME)<0)e.interested.push(ME); }
     if(kind==='leave'){ e.interested=e.interested.filter(function(n){return n!==ME;}); e.booked=e.booked.filter(function(n){return n!==ME;}); }
     if(kind==='book'){ e.interested=e.interested.filter(function(n){return n!==ME;}); if(e.booked.indexOf(ME)<0)e.booked.push(ME); }
     saveExc(); renderDays();
   };
 });
}
function getEx(date,id){ return (exStore[date]||[]).filter(function(e){return e.id===id;})[0]; }

/* ---- track which day is in view to highlight the rail ---- */
function setupScrollSpy(){
 var obs=new IntersectionObserver(function(entries){
   entries.forEach(function(en){
     if(en.isIntersecting){
       var d=en.target.id.replace('d','');
       document.querySelectorAll('.rstop').forEach(function(r){
         r.classList.toggle('active', r.dataset.day===d && !r.classList.contains('today'));
       });
       var a=document.querySelector('.rstop[data-day="'+d+'"]');
       if(a) a.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
     }
   });
 },{rootMargin:'-45% 0px -50% 0px',threshold:0});
 document.querySelectorAll('.day').forEach(function(s){obs.observe(s);});
}

/* ============ ADD EXCURSION MODAL ============ */
var scrim=document.getElementById('scrim'), modal=document.getElementById('modal');
function closeModal(){scrim.classList.remove('open');modal.classList.remove('open');}
scrim.onclick=closeModal;
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

function openAdd(date){
 var day=DAYS.filter(function(p){return p.date===date;})[0];
 var status='interested';
 modal.innerHTML=
   '<h3>Add an excursion</h3>'
  +'<div class="msub">'+day.city+(day.country?', '+day.country:'')+' · '+day.dow+' Jul '+day.d+'</div>'
  +'<label>What is it?</label><input id="fn" placeholder="e.g. Old Town walking tour" autocomplete="off">'
  +'<label>Roughly how long? (optional)</label><input id="fd" placeholder="e.g. 4 hrs" autocomplete="off">'
  +'<label>Are you interested, or already booked?</label>'
  +'<div class="seg" id="fs">'
    +'<button class="on" data-s="interested"><span class="dotmark"></span>Interested</button>'
    +'<button data-s="booked"><span class="dotmark"></span>I booked it</button>'
  +'</div>'
  +'<label>Screenshot (optional)</label>'
  +'<div class="shot">'+camSvg+'<div>Attach a booking screenshot<small>Used to fill in the details</small></div></div>'
  +'<div class="m-actions"><button class="m-cancel" id="fc">Cancel</button><button class="m-save" id="fv">Add to board</button></div>';

 scrim.classList.add('open'); modal.classList.add('open');
 modal.querySelectorAll('#fs button').forEach(function(b){
   b.onclick=function(){ modal.querySelectorAll('#fs button').forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); status=b.dataset.s; };
 });
 document.getElementById('fc').onclick=closeModal;
 document.getElementById('fv').onclick=function(){
   var n=document.getElementById('fn').value.trim();
   if(!n){document.getElementById('fn').focus();return;}
   var meta=document.getElementById('fd').value.trim();
   if(!exStore[date])exStore[date]=[];
   exStore[date].push({id:'u'+Date.now(),name:n,meta:meta,booked:status==='booked'?[ME]:[],interested:status==='interested'?[ME]:[]});
   saveExc(); closeModal(); renderDays();
   var el=document.getElementById('d'+day.d); if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
 };
 setTimeout(function(){document.getElementById('fn').focus();},320);
}

/* ---- init ---- */
renderRail(); renderDays(); setupScrollSpy();
/* land on today on first open */
window.addEventListener('load',function(){
 var t=DAYS.filter(function(p){return p.date===TODAY;})[0];
 var el=document.getElementById('d'+t.d);
 if(el) el.scrollIntoView({block:'start'});
});
</script>
