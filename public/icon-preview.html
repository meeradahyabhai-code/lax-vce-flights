<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>DFC2026 icon options</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:wght@500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#faf8f3;font-family:'DM Sans',sans-serif;color:#1a3a6b;padding:28px 20px 60px;text-align:center}
  h1{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:30px;margin-bottom:6px}
  .sub{color:#5a6b80;font-size:14px;margin-bottom:30px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:26px 18px;max-width:520px;margin:0 auto}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
  .ic{width:150px;height:150px;border-radius:34px;overflow:hidden;position:relative;box-shadow:0 8px 22px rgba(14,31,56,.28)}
  .ic img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .ct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-shadow:0 2px 16px rgba(0,0,0,.6)}
  .cap{font-size:13px;font-weight:600;color:#1a3a6b}
  .dfc{font-family:'Cormorant Garamond',serif;font-weight:600;line-height:.9;font-size:50px}
  .yr{font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:5px;text-indent:5px;color:#e6c477;font-size:13px;margin-top:8px}
  /* A,B: rich deep ocean (boat + wake reads as sea) */
  .sea img{filter:saturate(1.3) contrast(1.06) brightness(1.0)}
  .sea .v{position:absolute;inset:0;background:radial-gradient(95% 95% at 50% 46%,rgba(6,16,38,.06),rgba(6,16,38,.42))}
  .seabright img{filter:saturate(1.45) contrast(1.05) brightness(1.12)}
  /* C,D: Santorini, dark + moody (recognizable, not washed) */
  .san img{filter:saturate(.92) brightness(.8)}
  .san .v{position:absolute;inset:0;background:radial-gradient(120% 120% at 50% 40%,rgba(8,14,26,.12),rgba(8,14,26,.66))}
  .santight img{object-position:50% 38%;transform:scale(1.2)}
</style></head>
<body>
  <h1>DFC2026 icon</h1>
  <div class="sub">Round 2 &middot; tell Claude the letter you like</div>
  <div class="grid">
    <div class="wrap"><div class="ic sea"><img src="/media/icon-sea.jpg"><div class="v"></div><div class="ct"><div class="dfc">DFC</div><div class="yr">2026</div></div></div><div class="cap">A &middot; deep ocean</div></div>
    <div class="wrap"><div class="ic sea seabright"><img src="/media/icon-sea.jpg"><div class="v"></div><div class="ct"><div class="dfc">DFC</div><div class="yr">2026</div></div></div><div class="cap">B &middot; brighter ocean</div></div>
    <div class="wrap"><div class="ic san"><img src="/media/santorini.jpg"><div class="v"></div><div class="ct"><div class="dfc">DFC</div><div class="yr">2026</div></div></div><div class="cap">C &middot; Santorini, moody</div></div>
    <div class="wrap"><div class="ic san santight"><img src="/media/santorini.jpg"><div class="v"></div><div class="ct"><div class="dfc">DFC</div><div class="yr">2026</div></div></div><div class="cap">D &middot; Santorini, tighter</div></div>
  </div>
</body></html>
