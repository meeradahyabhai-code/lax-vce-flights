<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>DFC2026 icon options</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#faf8f3;font-family:'DM Sans',sans-serif;color:#1a3a6b;padding:28px 20px 60px;text-align:center}
  h1{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:30px;margin-bottom:6px}
  .sub{color:#5a6b80;font-size:14px;margin-bottom:30px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:26px 18px;max-width:520px;margin:0 auto}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
  .ic{width:150px;height:150px;border-radius:34px;overflow:hidden;position:relative;box-shadow:0 8px 22px rgba(14,31,56,.28)}
  .ic img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(.9) contrast(1) brightness(.82)}
  .v{position:absolute;inset:0;background:radial-gradient(120% 120% at 50% 40%,rgba(8,14,26,.1),rgba(8,14,26,.62))}
  .ct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
  .cap{font-size:13px;font-weight:600;color:#1a3a6b}
  .A .dfc{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:52px;line-height:.9;text-shadow:0 2px 14px rgba(0,0,0,.5)}
  .A .yr{font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;letter-spacing:6px;color:#d8b766;margin-top:8px;text-indent:6px}
  .B .dfc{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:30px;letter-spacing:1px}
  .B .rule{width:40px;height:1px;background:rgba(255,255,255,.7);margin:7px 0}
  .B .yr{font-family:'DM Sans',sans-serif;font-weight:500;font-size:12px;letter-spacing:4px;text-indent:4px}
  .C .dfc{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:44px;letter-spacing:7px;text-indent:7px;text-shadow:0 2px 14px rgba(0,0,0,.5)}
  .C .yr{font-family:'DM Sans',sans-serif;font-weight:500;font-size:12px;letter-spacing:4px;opacity:.9;margin-top:5px;text-indent:4px}
  .D .dfc{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:52px;line-height:.9;text-shadow:0 2px 14px rgba(0,0,0,.5)}
  .D .yr{font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;letter-spacing:6px;color:#d8b766;margin-top:8px;text-indent:6px}
</style></head>
<body>
  <h1>DFC2026 icon</h1>
  <div class="sub">Four directions &middot; tell Claude the letter you like (or tweaks)</div>
  <div class="grid">
    <div class="wrap"><div class="ic A"><img src="/media/sea-day-poster.jpg"><div class="v"></div><div class="ct"><div class="dfc">DFC</div><div class="yr">2026</div></div></div><div class="cap">A &middot; sea + gold year</div></div>
    <div class="wrap"><div class="ic B"><img src="/media/sea-day-poster.jpg"><div class="v"></div><div class="ct"><div class="dfc">DFC</div><div class="rule"></div><div class="yr">2026</div></div></div><div class="cap">B &middot; sea + thin rule</div></div>
    <div class="wrap"><div class="ic C"><img src="/media/sea-day-poster.jpg"><div class="v"></div><div class="ct"><div class="dfc">DFC</div><div class="yr">2026</div></div></div><div class="cap">C &middot; spaced, all white</div></div>
    <div class="wrap"><div class="ic D"><img src="/media/santorini.jpg"><div class="v"></div><div class="ct"><div class="dfc">DFC</div><div class="yr">2026</div></div></div><div class="cap">D &middot; Santorini + gold</div></div>
  </div>
</body></html>
